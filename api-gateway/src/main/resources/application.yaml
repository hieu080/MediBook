spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  cloud:
    gateway:
      routes:
        - id: identity-service
          uri: http://${IDENTITY_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/identity/**
        - id: patient-service
          uri: http://${PATIENT_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/patient/**
        - id: doctor-schedule-service
          uri: http://${DOCTOR_SCHEDULE_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/api/schedule/**
        - id: appointment-service
          uri: http://${APPOINTMENT_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/api/appointment/**
        - id: payment-service
          uri: http://${PAYMENT_SERVICE_HOST:localhost}:8085
          predicates:
            - Path=/api/payment/**
        - id: queue-service
          uri: http://${QUEUE_SERVICE_HOST:localhost}:8086
          predicates:
            - Path=/api/queue/**
        - id: notification-service
          uri: http://${NOTIFICATION_SERVICE_HOST:localhost}:8087
          predicates:
            - Path=/api/notification/**
        - id: reporting-service
          uri: http://${REPORTING_SERVICE_HOST:localhost}:8088
          predicates:
            - Path=/api/reporting/**
        - id: audit-service
          uri: http://${AUDIT_SERVICE_HOST:localhost}:8089
          predicates:
            - Path=/api/audit/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080
